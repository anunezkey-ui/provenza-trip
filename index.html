<!DOCTYPE html>

<head>

<title>Provenza Trip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}

<script>
var isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)||(window.innerWidth<=768&&'ontouchstart' in window);
setTimeout(function(){window.location.replace(isMobile?'provenza_planner_v6_mobile.html':'provenza_planner_v6.html');},600);
</script>
